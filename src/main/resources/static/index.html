<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div id="game-container">
            <div id="header">
                <h1>Snake Game</h1>
                <div id="score-board">
                    <span>Score: <strong id="score">0</strong></span>
                    <span>Best: <strong id="high-score">0</strong></span>
                </div>
            </div>
            <div id="canvas-wrapper">
                <canvas id="game-canvas"></canvas>
                <div id="overlay" class="hidden">
                    <div id="overlay-content">
                        <h2 id="overlay-title">Game Over</h2>
                        <p id="overlay-sub">Press SPACE to restart</p>
                        <div id="submit-score" class="hidden">
                            <input type="text" id="player-name" placeholder="Enter name" maxlength="10">
                            <button id="submit-btn">Submit</button>
                        </div>
                        <p id="submit-msg" class="hidden"></p>
                    </div>
                </div>
                <div id="start-overlay">
                    <div id="start-content">
                        <h2>Snake Game</h2>
                        <p>Arrow Keys / WASD to move</p>
                        <p>Press <kbd>Space</kbd> to start</p>
                    </div>
                </div>
            </div>
            <div id="controls">
                <button id="btn-restart">Restart</button>
                <button id="btn-pause">Pause</button>
            </div>
                        </div>
            <div id="settings">
                <div class="setting-header" id="settings-toggle">Settings &#9660;</div>
                <div id="settings-body">
                    <div class="setting-row">
                        <label>Speed: <strong id="speed-value">150ms</strong></label>
                        <input type="range" id="speed-slider" min="30" max="300" value="150" step="10">
                        <div class="speed-presets">
                            <button class="speed-btn" data-speed="200">Easy</button>
                            <button class="speed-btn active" data-speed="150">Medium</button>
                            <button class="speed-btn" data-speed="80">Hard</button>
                            <button class="speed-btn" data-speed="40">Insane</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="leaderboard">
                <h3>Leaderboard</h3>
                <table id="rank-table">
                    <thead>
                        <tr><th>#</th><th>Player</th><th>Score</th><th>Length</th></tr>
                    </thead>
                    <tbody id="rank-body"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="js/game.js"></script>
</body>
</html>
