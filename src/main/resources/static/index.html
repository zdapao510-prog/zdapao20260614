<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div id="game-container">
            <div id="header">
                <h1>Snake Game</h1>
                <div id="score-board">
                    <span>Score: <strong id="score">0</strong></span>
                    <span>Best: <strong id="high-score">0</strong></span>
                </div>
            </div>
            <div id="canvas-wrapper">
                <canvas id="game-canvas"></canvas>
                <div id="overlay" class="hidden">
                    <div id="overlay-content">
                        <h2 id="overlay-title">Game Over</h2>
                        <p id="overlay-sub">Press SPACE to restart</p>
                        <div id="submit-score" class="hidden">
                            <input type="text" id="player-name" placeholder="Enter name" maxlength="10">
                            <button id="submit-btn">Submit</button>
                        </div>
                        <p id="submit-msg" class="hidden"></p>
                    </div>
                </div>
                <div id="start-overlay">
                    <div id="start-content">
                        <h2>?? 贪吃蛇</h2>
                        <p>方向键 / WASD 控制移动</p>
                        <p>按 <kbd>Space</kbd> 开始游戏</p>
                    </div>
                </div>
            </div>
            <div id="controls">
                <button id="btn-restart">Restart</button>
                <button id="btn-pause">Pause</button>
            </div>
            <div id="leaderboard">
                <h3>Leaderboard</h3>
                <table id="rank-table">
                    <thead>
                        <tr><th>#</th><th>Player</th><th>Score</th><th>Length</th></tr>
                    </thead>
                    <tbody id="rank-body"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="js/game.js"></script>
</body>
</html>
